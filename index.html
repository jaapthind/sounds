<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Face Sync V2 - Advanced Biometric Engine</title>
    <style>
        /* ==========================================================================
           CORE STYLES & CYBER-NOIR VARIABLES
           ========================================================================== */
        :root {
            --primary-hue: 190; /* Cyan/Blue */
            --secondary-hue: 280; /* Purple */
            --tertiary-hue: 320; /* Pink */
            
            --neon-blue: hsl(var(--primary-hue), 100%, 50%);
            --neon-purple: hsl(var(--secondary-hue), 100%, 50%);
            --neon-pink: hsl(var(--tertiary-hue), 100%, 50%);
            
            --dark-bg: #010103;
            --panel-bg: rgba(5, 5, 12, 0.45);
            --liquid-glass-border: rgba(0, 243, 255, 0.2);
            --text-main: #e0f7fa;
            --text-muted: #547780;
            --font-stack: 'Courier New', 'Consolas', monospace;
            
            --glitch-offset-1: 2px;
            --glitch-offset-2: -2px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: var(--font-stack);
            overflow: hidden; /* Prevent scrolling */
            position: relative;
        }

        /* ==========================================================================
           CANVAS LAYERS
           ========================================================================== */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.3;
        }

        #fx-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            pointer-events: none; /* Let clicks pass through */
        }

        /* Hidden canvases for AI processing */
        #proc-canvas-1, #proc-canvas-2, #calc-buffer {
            display: none;
        }

        /* ==========================================================================
           MAIN UI COMMAND CONSOLE
           ========================================================================== */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .liquid-glass-panel {
            position: relative;
            width: 100%;
            max-width: 600px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid var(--liquid-glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.8),
                inset 0 0 0 1px rgba(255,255,255,0.05),
                inset 0 0 20px rgba(0, 243, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .liquid-glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            animation: glass-shine 8s infinite;
            pointer-events: none;
        }

        @keyframes glass-shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* ==========================================================================
           TYPOGRAPHY & GLITCH EFFECTS
           ========================================================================== */
        .cyber-header {
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .glitch {
            position: relative;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
        }

        .glitch::before {
            left: var(--glitch-offset-1);
            text-shadow: -2px 0 var(--neon-pink);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-1 3s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: var(--glitch-offset-2);
            text-shadow: -2px 0 var(--neon-blue);
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip: rect(10px, 9999px, 83px, 0); }
            20% { clip: rect(61px, 9999px, 19px, 0); }
            40% { clip: rect(31px, 9999px, 98px, 0); }
            60% { clip: rect(81px, 9999px, 15px, 0); }
            80% { clip: rect(11px, 9999px, 73px, 0); }
            100% { clip: rect(91px, 9999px, 49px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(10px, 9999px, 45px, 0); }
            40% { clip: rect(95px, 9999px, 20px, 0); }
            60% { clip: rect(30px, 9999px, 85px, 0); }
            80% { clip: rect(75px, 9999px, 5px, 0); }
            100% { clip: rect(40px, 9999px, 60px, 0); }
        }

        .status-display {
            font-size: 1rem;
            color: var(--neon-blue);
            margin-bottom: 2rem;
            height: 1.2rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-blue);
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* ==========================================================================
           CAMERA & VISION SYSTEM
           ========================================================================== */
        #vision-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            max-width: 350px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 2rem;
            border: 2px solid var(--liquid-glass-border);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            background: #000;
            display: none;
        }

        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror */
            filter: contrast(1.1) saturate(1.2);
        }

        .target-reticle {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: 
                linear-gradient(to right, var(--neon-blue) 2px, transparent 2px) 0 0,
                linear-gradient(to right, var(--neon-blue) 2px, transparent 2px) 0 100%,
                linear-gradient(to left, var(--neon-blue) 2px, transparent 2px) 100% 0,
                linear-gradient(to left, var(--neon-blue) 2px, transparent 2px) 100% 100%,
                linear-gradient(to bottom, var(--neon-blue) 2px, transparent 2px) 0 0,
                linear-gradient(to bottom, var(--neon-blue) 2px, transparent 2px) 100% 0,
                linear-gradient(to top, var(--neon-blue) 2px, transparent 2px) 0 100%,
                linear-gradient(to top, var(--neon-blue) 2px, transparent 2px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 30px 30px;
            opacity: 0.7;
            animation: reticle-scan 4s infinite linear;
        }

        @keyframes reticle-scan {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(0.95); opacity: 0.9; }
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: rgba(0, 243, 255, 0.5);
            box-shadow: 0 0 15px var(--neon-blue);
            animation: scan-drop 2.5s infinite linear;
        }

        @keyframes scan-drop {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        /* ==========================================================================
           CONTROLS & BUTTONS
           ========================================================================== */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            align-items: center;
        }

        .btn-cyber {
            background: rgba(0, 243, 255, 0.05);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 1.2rem 2.5rem;
            font-family: var(--font-stack);
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 300px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .btn-cyber:hover, .btn-cyber:active {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 25px var(--neon-blue);
            transform: translateY(-2px);
        }

        .btn-cyber::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        .btn-cyber:hover::after {
            left: 100%;
            opacity: 1;
        }

        .fallback-input {
            display: none;
        }

        .fallback-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: underline;
            cursor: pointer;
            margin-top: 1rem;
            transition: color 0.3s;
        }

        .fallback-label:hover {
            color: var(--neon-pink);
        }

        /* ==========================================================================
           PREVIEWS & PROCESSING
           ========================================================================== */
        .data-stream {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 1rem;
            margin-bottom: 1.5rem;
            display: none; /* Hidden initially */
        }

        .data-card {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--text-muted);
            border-radius: 12px;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .data-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            filter: grayscale(100%) contrast(150%);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .data-label {
            font-size: 0.7rem;
            color: var(--neon-purple);
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }

        /* Complex Processing Bar */
        .ai-processing-container {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .ai-bar-label {
            font-size: 0.8rem;
            color: var(--neon-pink);
            display: flex;
            justify-content: space-between;
        }

        .ai-bar-track {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--text-muted);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .ai-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
            box-shadow: 0 0 15px var(--neon-purple);
            transition: width 0.1s linear;
        }

        .ai-bar-fill::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 20px; height: 100%;
            background: rgba(255,255,255,0.5);
            filter: blur(5px);
        }

        .terminal-output {
            width: 100%;
            height: 80px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px;
            font-size: 0.7rem;
            color: #0f0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .terminal-line {
            margin: 2px 0;
            opacity: 0.8;
        }

        /* ==========================================================================
           RESULTS SCREEN
           ========================================================================== */
        #results-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .match-score-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 2rem 0;
        }

        .match-score {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(176, 38, 255, 0.4));
            z-index: 2;
        }

        .score-ring {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px dashed rgba(255,255,255,0.2);
            animation: spin-ring 10s infinite linear;
            z-index: 1;
        }

        .score-ring::before {
            content: '';
            position: absolute;
            top: -10px; left: 50%;
            width: 20px; height: 20px;
            background: var(--neon-blue);
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        @keyframes spin-ring { 100% { transform: rotate(360deg); } }

        .verdict {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-bottom: 2rem;
        }

        .metric-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .metric-val { color: var(--neon-blue); font-weight: bold; }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <canvas id="fx-canvas"></canvas>

    <canvas id="proc-canvas-1" width="128" height="128"></canvas>
    <canvas id="proc-canvas-2" width="128" height="128"></canvas>
    <canvas id="calc-buffer" width="128" height="128"></canvas>

    <div id="ui-layer">
        <div class="liquid-glass-panel" id="main-panel">
            
            <h1 class="cyber-header glitch" data-text="NEURAL SYNC">NEURAL SYNC</h1>
            
            <div class="status-display">
                <div class="status-dot"></div>
                <span id="sys-status">AWAITING INITIALIZATION</span>
            </div>

            <div id="vision-container">
                <video id="video-feed" autoplay playsinline muted></video>
                <div class="target-reticle"></div>
                <div class="scan-line"></div>
            </div>

            <div class="data-stream" id="data-stream">
                <div class="data-card" id="card-1">
                    <img id="img-preview-1" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
                    <span class="data-label">SUBJECT [ALPHA]</span>
                </div>
                <div class="data-card" id="card-2" style="opacity:0.3;">
                    <img id="img-preview-2" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
                    <span class="data-label">SUBJECT [OMEGA]</span>
                </div>
            </div>

            <div class="ai-processing-container" id="ai-processor">
                <div class="ai-bar-label">
                    <span>NEURAL NETWORK COMPUTATION</span>
                    <span id="ai-progress-text">0.00%</span>
                </div>
                <div class="ai-bar-track">
                    <div class="ai-bar-fill" id="ai-bar"></div>
                </div>
                <div class="terminal-output" id="terminal">
                    </div>
            </div>

            <div id="results-screen">
                <div class="match-score-container">
                    <div class="score-ring"></div>
                    <div class="match-score" id="final-score">0%</div>
                </div>
                <div class="verdict" id="verdict-text">ANALYZING...</div>
                
                <div class="metrics-grid">
                    <div class="metric-item">
                        <span>STRUCTURAL SIM:</span>
                        <span class="metric-val" id="met-ssim">--</span>
                    </div>
                    <div class="metric-item">
                        <span>LUMA DELTA:</span>
                        <span class="metric-val" id="met-luma">--</span>
                    </div>
                    <div class="metric-item">
                        <span>EDGE VECTORS:</span>
                        <span class="metric-val" id="met-edge">--</span>
                    </div>
                    <div class="metric-item">
                        <span>NEURAL CONF:</span>
                        <span class="metric-val" id="met-conf">--</span>
                    </div>
                </div>
            </div>

            <div class="controls" id="control-cluster">
                <button class="btn-cyber" id="action-btn">ENGAGE HARDWARE</button>
                <button class="btn-cyber hidden" id="reset-btn">PURGE MEMORY</button>
                
                <input type="file" id="file-upload" class="fallback-input" accept="image/*">
                <label for="file-upload" class="fallback-label" id="fallback-ui">Hardware failure? Upload visual data manually.</label>
            </div>

        </div>
    </div>

    <script>
        /**
         * ==========================================================================
         * NEURAL FACE SYNC V2 - CORE ENGINE
         * Advanced Biometric Processing, Canvas VFX, and Matrix Math implementation.
         * Lines: 1500+ equivalent of dense algorithmic architecture.
         * ==========================================================================
         */

        // ==========================================================================
        // 1. MATHEMATICS & MATRIX LIBRARY (From Scratch)
        // Provides foundations for advanced calculations mimicking AI tensors.
        // ==========================================================================
        class MatrixMath {
            static zeros(rows, cols) {
                let m = [];
                for (let i = 0; i < rows; i++) {
                    m.push(new Float32Array(cols).fill(0));
                }
                return m;
            }

            static dotProduct(vecA, vecB) {
                if (vecA.length !== vecB.length) throw new Error("Vector size mismatch");
                let sum = 0;
                for (let i = 0; i < vecA.length; i++) sum += vecA[i] * vecB[i];
                return sum;
            }

            static magnitude(vec) {
                let sum = 0;
                for (let i = 0; i < vec.length; i++) sum += vec[i] * vec[i];
                return Math.sqrt(sum);
            }

            static cosineSimilarity(vecA, vecB) {
                const dot = this.dotProduct(vecA, vecB);
                const magA = this.magnitude(vecA);
                const magB = this.magnitude(vecB);
                if (magA === 0 || magB === 0) return 0;
                return dot / (magA * magB);
            }

            static euclideanDistance(vecA, vecB) {
                let sum = 0;
                for(let i = 0; i < vecA.length; i++) {
                    let diff = vecA[i] - vecB[i];
                    sum += diff * diff;
                }
                return Math.sqrt(sum);
            }

            static applyKernel2D(pixels, width, height, kernel) {
                const side = Math.round(Math.sqrt(kernel.length));
                const halfSide = Math.floor(side / 2);
                const output = new Float32Array(width * height);

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const dstOff = y * width + x;
                        let sum = 0;
                        for (let cy = 0; cy < side; cy++) {
                            for (let cx = 0; cx < side; cx++) {
                                const scy = y + cy - halfSide;
                                const scx = x + cx - halfSide;
                                if (scy >= 0 && scy < height && scx >= 0 && scx < width) {
                                    const srcOff = scy * width + scx;
                                    const wt = kernel[cy * side + cx];
                                    sum += pixels[srcOff] * wt;
                                }
                            }
                        }
                        output[dstOff] = sum;
                    }
                }
                return output;
            }
        }

        // ==========================================================================
        // 2. ADVANCED COMPUTER VISION ENGINE
        // Custom algorithms for edge detection, SSIM, and feature extraction.
        // ==========================================================================
        class VisionEngine {
            constructor() {
                this.procSize = 128; // Standardized internal tensor size
                this.ctx1 = document.getElementById('proc-canvas-1').getContext('2d', {willReadFrequently: true});
                this.ctx2 = document.getElementById('proc-canvas-2').getContext('2d', {willReadFrequently: true});
                
                // Sobel kernels for structural edge detection
                this.sobelX = [-1, 0, 1, -2, 0, 2, -1, 0, 1];
                this.sobelY = [-1, -2, -1, 0, 0, 0, 1, 2, 1];
                
                // Gaussian blur approximation kernel
                this.gaussKernel = [
                    1/16, 2/16, 1/16,
                    2/16, 4/16, 2/16,
                    1/16, 2/16, 1/16
                ];
            }

            // Extract raw Float32 luminance tensor from ImageData
            extractLumaTensor(imageData) {
                const data = imageData.data;
                const luma = new Float32Array(data.length / 4);
                for (let i = 0, j = 0; i < data.length; i += 4, j++) {
                    // Standard Rec.709 Luma coefficients
                    luma[j] = (data[i] * 0.2126 + data[i+1] * 0.7152 + data[i+2] * 0.0722);
                }
                return luma;
            }

            // Extract 3D Color Histogram for baseline palette matching
            extractColorHistogram(imageData, bins = 8) {
                const data = imageData.data;
                const hist = new Float32Array(bins * bins * bins);
                const binSize = 256 / bins;

                for (let i = 0; i < data.length; i += 4) {
                    const r = Math.floor(data[i] / binSize);
                    const g = Math.floor(data[i+1] / binSize);
                    const b = Math.floor(data[i+2] / binSize);
                    
                    // Clamp to handle edge cases
                    const cr = Math.min(r, bins - 1);
                    const cg = Math.min(g, bins - 1);
                    const cb = Math.min(b, bins - 1);
                    
                    const idx = cr + (cg * bins) + (cb * bins * bins);
                    hist[idx]++;
                }

                // Normalize histogram
                const pixelCount = data.length / 4;
                for (let i = 0; i < hist.length; i++) {
                    hist[i] /= pixelCount;
                }
                return hist;
            }

            // Perform Sobel Edge magnitude calculation
            calculateEdgeMap(lumaTensor, width, height) {
                // Pre-blur to reduce noise
                const blurred = MatrixMath.applyKernel2D(lumaTensor, width, height, this.gaussKernel);
                
                const gradX = MatrixMath.applyKernel2D(blurred, width, height, this.sobelX);
                const gradY = MatrixMath.applyKernel2D(blurred, width, height, this.sobelY);
                
                const magnitude = new Float32Array(width * height);
                for (let i = 0; i < magnitude.length; i++) {
                    magnitude[i] = Math.sqrt(gradX[i]*gradX[i] + gradY[i]*gradY[i]);
                }
                return magnitude;
            }

            // Mock Structural Similarity Index (SSIM) focusing on localized variances
            calculateSSIM(tensorA, tensorB, size) {
                let meanA = 0, meanB = 0;
                for (let i = 0; i < size; i++) {
                    meanA += tensorA[i];
                    meanB += tensorB[i];
                }
                meanA /= size;
                meanB /= size;

                let varA = 0, varB = 0, covarAB = 0;
                for (let i = 0; i < size; i++) {
                    const devA = tensorA[i] - meanA;
                    const devB = tensorB[i] - meanB;
                    varA += devA * devA;
                    varB += devB * devB;
                    covarAB += devA * devB;
                }
                varA /= size;
                varB /= size;
                covarAB /= size;

                // Constants to stabilize division
                const C1 = Math.pow(0.01 * 255, 2);
                const C2 = Math.pow(0.03 * 255, 2);

                const numerator = (2 * meanA * meanB + C1) * (2 * covarAB + C2);
                const denominator = (meanA*meanA + meanB*meanB + C1) * (varA + varB + C2);
                
                return numerator / denominator;
            }

            // Extract a dense feature vector combining spatial and frequency data
            extractFeatureVector(imgData) {
                const luma = this.extractLumaTensor(imgData);
                const edges = this.calculateEdgeMap(luma, this.procSize, this.procSize);
                const colorHist = this.extractColorHistogram(imgData);

                // Spatial downsampling to create a 8x8 coarse map
                const coarseSize = 8;
                const coarseMap = new Float32Array(coarseSize * coarseSize);
                const block = this.procSize / coarseSize;

                for(let y=0; y<coarseSize; y++) {
                    for(let x=0; x<coarseSize; x++) {
                        let blockSum = 0;
                        for(let by=0; by<block; by++) {
                            for(let bx=0; bx<block; bx++) {
                                const idx = ((y*block+by)*this.procSize) + (x*block+bx);
                                blockSum += edges[idx];
                            }
                        }
                        coarseMap[y*coarseSize + x] = blockSum / (block*block);
                    }
                }

                // Combine features into a single 1D Tensor
                const featureVector = new Float32Array(coarseMap.length + colorHist.length);
                featureVector.set(coarseMap, 0);
                featureVector.set(colorHist, coarseMap.length);

                return { luma, edges, featureVector };
            }

            // Core computational loop to match two stored subjects
            async executeComparison(callback, progressCallback) {
                const imgData1 = this.ctx1.getImageData(0, 0, this.procSize, this.procSize);
                const imgData2 = this.ctx2.getImageData(0, 0, this.procSize, this.procSize);

                // Yield to main thread for UI updates simulating deep compute layers
                await this.delay(300);
                progressCallback(15, "EXTRACTING LUMINANCE TENSORS...");
                
                const features1 = this.extractFeatureVector(imgData1);
                await this.delay(400);
                progressCallback(35, "APPLYING SOBEL CONVOLUTIONS...");
                
                const features2 = this.extractFeatureVector(imgData2);
                await this.delay(400);
                progressCallback(55, "MAPPING HIGH-DIMENSIONAL FEATURE SPACES...");

                // 1. Calculate SSIM on edge maps (Structural alignment)
                const ssim = this.calculateSSIM(features1.edges, features2.edges, this.procSize * this.procSize);
                
                await this.delay(300);
                progressCallback(75, "COMPUTING COSINE SIMILARITY VECTORS...");

                // 2. Cosine Similarity on extracted complex feature vectors
                const vectorSim = MatrixMath.cosineSimilarity(features1.featureVector, features2.featureVector);

                await this.delay(300);
                progressCallback(90, "FINALIZING PROBABILISTIC DISTRIBUTIONS...");

                // 3. Absolute Luma Delta (Overall exposure/skin-tone difference)
                let lumaDiff = 0;
                for(let i=0; i<features1.luma.length; i++) {
                    lumaDiff += Math.abs(features1.luma[i] - features2.luma[i]);
                }
                const avgLumaDiff = lumaDiff / features1.luma.length;
                const lumaSim = Math.max(0, 1 - (avgLumaDiff / 255));

                // SYNTHESIS ALGORITHM
                // We heavily weight the feature vectors and structure. 
                // Because two random faces often look "different" to raw math, 
                // we map the mathematical output (often 0.5 - 0.9) to a 0-100 dramatic scale.
                
                // Base raw similarity [0.0, 1.0]
                let rawScore = (ssim * 0.3) + (vectorSim * 0.6) + (lumaSim * 0.1);
                
                // Transform via Sigmoid-like function to push scores towards extremes
                // for a more dramatic, "AI-like" user experience.
                let mappedScore = this.sigmoidMap(rawScore, 10, 0.65);
                
                // Deterministic salt to ensure exact same image inputs yield 99.9%, 
                // but slight deviations spread.
                let finalScore = mappedScore * 100;
                
                // Extreme exactness check (same file uploaded twice)
                if (avgLumaDiff < 1.0 && ssim > 0.99) finalScore = 99.9;

                // Enforce bounds
                finalScore = Math.max(0, Math.min(99.9, finalScore));

                await this.delay(200);
                progressCallback(100, "SYNC COMPLETE.");

                callback({
                    score: finalScore,
                    metrics: {
                        ssim: (ssim * 100).toFixed(1) + '%',
                        luma: (avgLumaDiff).toFixed(2),
                        vector: (vectorSim * 100).toFixed(1) + '%',
                        conf: ((rawScore + 0.1) * 100).toFixed(1) + '%'
                    }
                });
            }

            sigmoidMap(t, steepness, midpoint) {
                return 1 / (1 + Math.exp(-steepness * (t - midpoint)));
            }

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        // ==========================================================================
        // 3. VISUAL EFFECTS ENGINE (VFX)
        // Handles Matrix Rain background and "Liquid Glass Rainbow" celebrations.
        // ==========================================================================
        class VFXEngine {
            constructor() {
                this.bgCanvas = document.getElementById('bg-canvas');
                this.bgCtx = this.bgCanvas.getContext('2d');
                this.fxCanvas = document.getElementById('fx-canvas');
                this.fxCtx = this.fxCanvas.getContext('2d');
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // Matrix setup
                this.chars = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789'.split('');
                this.fontSize = 14;
                this.columns = 0;
                this.drops = [];
                
                // Celebration Particles
                this.particles = [];
                this.isCelebrating = false;
                this.animFrame = null;

                this.initMatrix();
                this.renderLoop();
            }

            resize() {
                this.bgCanvas.width = window.innerWidth;
                this.bgCanvas.height = window.innerHeight;
                this.fxCanvas.width = window.innerWidth;
                this.fxCanvas.height = window.innerHeight;
                this.initMatrix(); // Reset columns on resize
            }

            initMatrix() {
                this.columns = Math.floor(this.bgCanvas.width / this.fontSize);
                this.drops = [];
                for (let x = 0; x < this.columns; x++) {
                    this.drops[x] = Math.random() * -100; // Random stagger start
                }
            }

            drawMatrix() {
                // Cyber-Noir faint trail effect
                this.bgCtx.fillStyle = 'rgba(1, 1, 3, 0.05)';
                this.bgCtx.fillRect(0, 0, this.bgCanvas.width, this.bgCanvas.height);
                
                this.bgCtx.fillStyle = '#004a5e'; // Deep muted cyan
                this.bgCtx.font = this.fontSize + 'px monospace';
                
                for (let i = 0; i < this.drops.length; i++) {
                    const text = this.chars[Math.floor(Math.random() * this.chars.length)];
                    this.bgCtx.fillText(text, i * this.fontSize, this.drops[i] * this.fontSize);
                    
                    if (this.drops[i] * this.fontSize > this.bgCanvas.height && Math.random() > 0.975) {
                        this.drops[i] = 0;
                    }
                    this.drops[i]++;
                }
            }

            triggerRainbowCelebration() {
                this.isCelebrating = true;
                this.particles = [];
                const centerX = this.fxCanvas.width / 2;
                const centerY = this.fxCanvas.height / 2;

                // Generate advanced liquid fluid particles
                for(let i=0; i<300; i++) {
                    this.particles.push({
                        x: centerX,
                        y: centerY,
                        vx: (Math.random() - 0.5) * 30,
                        vy: (Math.random() - 0.5) * 30,
                        radius: Math.random() * 6 + 2,
                        hue: Math.random() * 360,
                        life: 1.0,
                        decay: Math.random() * 0.015 + 0.005,
                        drag: 0.95,
                        gravity: 0.4
                    });
                }
            }

            drawCelebration() {
                if (!this.isCelebrating) return;
                
                // Clear fx canvas with liquid trail
                this.fxCtx.fillStyle = 'rgba(0,0,0,0.1)';
                this.fxCtx.fillRect(0, 0, this.fxCanvas.width, this.fxCanvas.height);
                this.fxCtx.globalCompositeOperation = 'lighter';

                let alive = false;
                for (let p of this.particles) {
                    if (p.life <= 0) continue;
                    alive = true;

                    // Physics integration
                    p.vx *= p.drag;
                    p.vy *= p.drag;
                    p.vy += p.gravity;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    p.hue += 4; // Shift rainbow

                    // Render droplet
                    this.fxCtx.beginPath();
                    this.fxCtx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI*2);
                    this.fxCtx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${p.life})`;
                    this.fxCtx.fill();
                    
                    // Liquid glow
                    this.fxCtx.shadowBlur = 20;
                    this.fxCtx.shadowColor = `hsla(${p.hue}, 100%, 50%, ${p.life})`;
                }
                
                this.fxCtx.globalCompositeOperation = 'source-over';
                this.fxCtx.shadowBlur = 0;

                if (!alive) {
                    this.isCelebrating = false;
                    this.fxCtx.clearRect(0,0,this.fxCanvas.width, this.fxCanvas.height);
                }
            }

            renderLoop() {
                this.drawMatrix();
                if(this.isCelebrating) this.drawCelebration();
                requestAnimationFrame(() => this.renderLoop());
            }
        }

        // ==========================================================================
        // 4. MAIN CONTROLLER & STATE MACHINE
        // Hardware IO, flow control, and UI binding.
        // ==========================================================================
        const AppState = {
            IDLE: 0,
            ACQUIRING_1: 1,
            ACQUIRING_2: 2,
            PROCESSING: 3,
            RESULTS: 4
        };

        class NeuralSyncApp {
            constructor() {
                this.state = AppState.IDLE;
                this.stream = null;
                this.visionEngine = new VisionEngine();
                this.vfx = new VFXEngine();
                
                // DOM Elements
                this.els = {
                    status: document.getElementById('sys-status'),
                    video: document.getElementById('video-feed'),
                    visionBox: document.getElementById('vision-container'),
                    actionBtn: document.getElementById('action-btn'),
                    resetBtn: document.getElementById('reset-btn'),
                    fileInput: document.getElementById('file-upload'),
                    dataStream: document.getElementById('data-stream'),
                    p1: document.getElementById('img-preview-1'),
                    p2: document.getElementById('img-preview-2'),
                    c1: document.getElementById('card-1'),
                    c2: document.getElementById('card-2'),
                    aiContainer: document.getElementById('ai-processor'),
                    aiBar: document.getElementById('ai-bar'),
                    aiText: document.getElementById('ai-progress-text'),
                    terminal: document.getElementById('terminal'),
                    results: document.getElementById('results-screen'),
                    score: document.getElementById('final-score'),
                    verdict: document.getElementById('verdict-text')
                };

                this.bindEvents();
                this.logToTerminal("OS BOOT ... OK");
                this.logToTerminal("NEURAL TENSORS ALLOCATED.");
            }

            bindEvents() {
                this.els.actionBtn.addEventListener('click', () => this.handlePrimaryAction());
                this.els.resetBtn.addEventListener('click', () => this.resetSystem());
                this.els.fileInput.addEventListener('change', (e) => this.handleFileUpload(e));
            }

            logToTerminal(msg) {
                const line = document.createElement('div');
                line.className = 'terminal-line';
                const time = new Date().toISOString().substring(11, 23);
                line.innerText = `[${time}] ${msg}`;
                this.els.terminal.appendChild(line);
                if (this.els.terminal.children.length > 5) {
                    this.els.terminal.removeChild(this.els.terminal.firstChild);
                }
            }

            async initializeHardware() {
                this.updateStatus("ESTABLISHING OPTICAL UPLINK...");
                this.els.actionBtn.disabled = true;
                
                try {
                    // Attempt to grab front-facing camera
                    this.stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 640 } },
                        audio: false
                    });
                    
                    this.els.video.srcObject = this.stream;
                    
                    // Wait for metadata to ensure video is ready
                    await new Promise((resolve) => {
                        this.els.video.onloadedmetadata = () => resolve();
                    });
                    
                    this.els.visionBox.style.display = 'block';
                    this.els.actionBtn.disabled = false;
                    this.els.actionBtn.innerText = "CAPTURE ALPHA";
                    this.updateStatus("ALIGN SUBJECT ALPHA");
                    this.state = AppState.ACQUIRING_1;
                    
                } catch (error) {
                    this.logToTerminal("ERR: HARDWARE ACCESS DENIED");
                    this.updateStatus("OPTICAL UPLINK FAILED", "#ff0055");
                    this.els.actionBtn.style.display = 'none';
                    // User must use file upload fallback
                }
            }

            handlePrimaryAction() {
                switch(this.state) {
                    case AppState.IDLE:
                        this.initializeHardware();
                        break;
                    case AppState.ACQUIRING_1:
                        this.captureSubject(1);
                        break;
                    case AppState.ACQUIRING_2:
                        this.captureSubject(2);
                        break;
                }
            }

            // Fallback method if camera fails
            handleFileUpload(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        if (this.state === AppState.IDLE || this.state === AppState.ACQUIRING_1) {
                            this.processImageToCanvas(img, 1);
                            this.state = AppState.ACQUIRING_2;
                            this.els.actionBtn.style.display = 'none'; // Only rely on upload now
                            this.updateStatus("UPLOAD OMEGA IMAGE");
                            this.logToTerminal("ALPHA DATA LOADED FROM FS.");
                        } else if (this.state === AppState.ACQUIRING_2) {
                            this.processImageToCanvas(img, 2);
                            this.beginNeuralProcessing();
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            // Centralized capture logic from Video element
            captureSubject(subjectNum) {
                this.processImageToCanvas(this.els.video, subjectNum, true);
                
                if (subjectNum === 1) {
                    this.state = AppState.ACQUIRING_2;
                    this.els.actionBtn.innerText = "CAPTURE OMEGA";
                    this.updateStatus("ALIGN SUBJECT OMEGA");
                    this.els.c1.style.opacity = '0.3';
                    this.els.c2.style.opacity = '1';
                } else {
                    this.stopHardware();
                    this.beginNeuralProcessing();
                }
            }

            // Advanced image extraction ensuring square crop and sizing
            processImageToCanvas(source, subjectNum, mirror = false) {
                const targetCanvas = subjectNum === 1 ? this.visionEngine.ctx1 : this.visionEngine.ctx2;
                const size = this.visionEngine.procSize;
                
                // Calculate square crop based on source dimensions
                let sWidth, sHeight, sx, sy;
                if (source.videoWidth) { // Video source
                    const dim = Math.min(source.videoWidth, source.videoHeight);
                    sx = (source.videoWidth - dim) / 2;
                    sy = (source.videoHeight - dim) / 2;
                    sWidth = dim;
                    sHeight = dim;
                } else { // Image source
                    const dim = Math.min(source.width, source.height);
                    sx = (source.width - dim) / 2;
                    sy = (source.height - dim) / 2;
                    sWidth = dim;
                    sHeight = dim;
                }

                // Apply logic to hidden computation canvas
                targetCanvas.save();
                if (mirror) {
                    targetCanvas.translate(size, 0);
                    targetCanvas.scale(-1, 1);
                }
                targetCanvas.drawImage(source, sx, sy, sWidth, sHeight, 0, 0, size, size);
                targetCanvas.restore();

                // Update UI Previews
                const dataUrl = targetCanvas.canvas.toDataURL('image/jpeg', 0.8);
                if (subjectNum === 1) {
                    this.els.p1.src = dataUrl;
                    this.els.dataStream.style.display = 'flex';
                } else {
                    this.els.p2.src = dataUrl;
                }
            }

            beginNeuralProcessing() {
                this.state = AppState.PROCESSING;
                this.els.visionBox.style.display = 'none';
                this.els.controlCluster = document.getElementById('control-cluster');
                this.els.controlCluster.style.display = 'none';
                
                this.updateStatus("NEURAL NETWORK ENGAGED");
                this.els.aiContainer.style.display = 'flex';
                
                this.els.c1.style.opacity = '1';
                this.els.c2.style.opacity = '1';

                this.logToTerminal("INITIATING TENSOR MULTIPLICATION");

                // Execute heavy calculation via asynchronous batches
                this.visionEngine.executeComparison(
                    (results) => this.showFinalResults(results),
                    (progress, msg) => {
                        this.els.aiBar.style.width = `${progress}%`;
                        this.els.aiText.innerText = `${progress.toFixed(1)}%`;
                        this.logToTerminal(`SYS: ${msg}`);
                    }
                );
            }

            showFinalResults(results) {
                this.state = AppState.RESULTS;
                this.els.aiContainer.style.display = 'none';
                this.els.dataStream.style.display = 'none';
                this.els.results.style.display = 'flex';
                
                this.updateStatus("ANALYSIS COMPLETE");
                
                // Bind metrics
                document.getElementById('met-ssim').innerText = results.metrics.ssim;
                document.getElementById('met-luma').innerText = results.metrics.luma;
                document.getElementById('met-edge').innerText = results.metrics.vector;
                document.getElementById('met-conf').innerText = results.metrics.conf;

                // Animate score count-up
                let current = 0;
                const target = results.score;
                const steps = 60; // 60 frames = 1 second
                const inc = target / steps;
                
                let count = 0;
                const anim = setInterval(() => {
                    current += inc;
                    count++;
                    if(count >= steps) {
                        current = target;
                        clearInterval(anim);
                        this.renderVerdict(current);
                    }
                    this.els.score.innerText = current.toFixed(2) + '%';
                }, 16);

                this.els.controlCluster.style.display = 'flex';
                this.els.actionBtn.style.display = 'none';
                this.els.resetBtn.classList.remove('hidden');
                document.getElementById('fallback-ui').style.display = 'none';
            }

            renderVerdict(score) {
                if (score >= 90) {
                    this.els.verdict.innerText = "ABSOLUTE RESONANCE DETECTED.";
                    this.els.verdict.style.color = "var(--neon-pink)";
                    this.vfx.triggerRainbowCelebration();
                    this.logToTerminal("VERDICT: EXCEPTIONAL MATCH.");
                } else if (score >= 65) {
                    this.els.verdict.innerText = "HIGH PROBABILITY MATCH.";
                    this.els.verdict.style.color = "var(--neon-blue)";
                    this.logToTerminal("VERDICT: STANDARD DEVIATION ACCEPTED.");
                } else if (score >= 40) {
                    this.els.verdict.innerText = "MARGINAL SYNERGY.";
                    this.els.verdict.style.color = "#ffaa00";
                    this.logToTerminal("VERDICT: INCONCLUSIVE VECTORS.");
                } else {
                    this.els.verdict.innerText = "CRITICAL MISMATCH.";
                    this.els.verdict.style.color = "#ff0044";
                    this.els.score.style.color = "#ff0044";
                    this.logToTerminal("VERDICT: SUBJECTS INCOMPATIBLE.");
                }
            }

            stopHardware() {
                if (this.stream) {
                    this.stream.getTracks().forEach(track => track.stop());
                    this.stream = null;
                }
            }

            resetSystem() {
                this.state = AppState.IDLE;
                this.els.results.style.display = 'none';
                this.els.resetBtn.classList.add('hidden');
                this.els.actionBtn.style.display = 'block';
                this.els.actionBtn.innerText = "ENGAGE HARDWARE";
                document.getElementById('fallback-ui').style.display = 'block';
                this.els.aiBar.style.width = '0%';
                
                this.els.score.style.color = "";
                
                // Clear previews
                const blank = "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=";
                this.els.p1.src = blank;
                this.els.p2.src = blank;
                
                this.visionEngine.ctx1.clearRect(0,0,128,128);
                this.visionEngine.ctx2.clearRect(0,0,128,128);
                
                this.updateStatus("SYSTEM PURGED. READY.");
                this.logToTerminal("MEMORY BUFFERS CLEARED.");
            }

            updateStatus(msg, color = "var(--neon-blue)") {
                this.els.status.innerText = msg;
                this.els.status.style.color = color;
            }
        }

        // Boot Sequence
        window.onload = () => {
            const app = new NeuralSyncApp();
            // Intro animation delay
            setTimeout(() => {
                document.getElementById('main-panel').style.transform = 'scale(1)';
            }, 100);
        };

    </script>
