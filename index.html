<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Glass Clone</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #2c3e50; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #game-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        canvas { background-color: #ecf0f1; box-shadow: 0 0 20px rgba(0,0,0,0.8); max-width: 100%; max-height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud { display: flex; justify-content: space-between; padding: 20px; font-size: 24px; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; }
        #lvl-txt { background: #3498db; padding: 10px 20px; border-radius: 15px; }
        #status-txt { background: #e74c3c; padding: 10px 20px; border-radius: 15px; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto; z-index: 50;
        }
        h1 { color: #f1c40f; font-size: 50px; margin: 0 0 20px 0; text-align: center; }
        p { color: #fff; font-size: 22px; text-align: center; margin-bottom: 30px; }
        button {
            padding: 15px 50px; font-size: 28px; font-weight: bold; color: #fff;
            background: #2ecc71; border: none; border-radius: 10px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); text-transform: uppercase;
        }
        button:active { transform: scale(0.95); }
        #progress-bar { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: 200px; height: 20px; background: #333; border-radius: 10px; border: 2px solid #fff; display: none; }
        #progress-fill { width: 0%; height: 100%; background: #3498db; border-radius: 8px; transition: width 0.2s; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="ui">
        <div class="hud">
            <div id="lvl-txt">LVL 1</div>
            <div id="status-txt">DRAW LINE</div>
        </div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
    
    <div id="overlay">
        <h1 id="o-title">HAPPY GLASS</h1>
        <p id="o-desc">Draw lines to guide the water.<br>Fill the glass to the target line!</p>
        <button id="start-btn">PLAY</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
    const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
          Bodies = Matter.Bodies, Composite = Matter.Composite, Events = Matter.Events,
          Vector = Matter.Vector;

    const GW = 600, GH = 800;
    const engine = Engine.create({ positionIterations: 10, velocityIterations: 10 });
    const render = Render.create({
        element: document.getElementById('game-wrapper'), engine: engine,
        options: { width: GW, height: GH, wireframes: false, background: '#ecf0f1', pixelRatio: window.devicePixelRatio || 1 }
    });

    // 20 Hardcoded Levels Array [Spigot(x,y), Glass(x,y), Obstacles[[x,y,w,h,angle]...]]
    const levels = [
        { s: [300, 100], g: [300, 700], o: [] },
        { s: [100, 150], g: [450, 700], o: [[300, 400, 250, 20, 0.2]] },
        { s: [300, 100], g: [300, 700], o: [[200, 350, 150, 20, 0.5], [400, 500, 150, 20, -0.5]] },
        { s: [500, 150], g: [100, 700], o: [[300, 300, 300, 20, -0.3], [300, 550, 300, 20, 0.3]] },
        { s: [300, 100], g: [300, 700], o: [[300, 400, 100, 100, 0]] },
        { s: [100, 100], g: [500, 700], o: [[200, 250, 20, 150, 0], [400, 450, 20, 150, 0]] },
        { s: [300, 150], g: [300, 650], o: [[150, 400, 200, 20, 0.8], [450, 400, 200, 20, -0.8]] },
        { s: [150, 100], g: [150, 700], o: [[300, 300, 400, 20, 0], [150, 500, 300, 20, 0]] },
        { s: [500, 100], g: [100, 700], o: [[400, 250, 150, 20, -0.4], [250, 450, 150, 20, -0.4]] },
        { s: [300, 100], g: [500, 700], o: [[300, 300, 20, 200, 0], [150, 600, 300, 20, 0]] },
        { s: [100, 150], g: [100, 700], o: [[200, 300, 200, 20, 0.3], [200, 500, 200, 20, -0.3]] },
        { s: [500, 150], g: [500, 700], o: [[400, 300, 200, 20, -0.3], [400, 500, 200, 20, 0.3]] },
        { s: [300, 100], g: [300, 750], o: [[200, 300, 80, 80, 0], [400, 300, 80, 80, 0], [300, 500, 80, 80, 0.785]] },
        { s: [100, 100], g: [400, 700], o: [[250, 200, 200, 20, 0], [250, 400, 200, 20, 0], [250, 600, 200, 20, 0]] },
        { s: [450, 100], g: [150, 700], o: [[300, 400, 400, 20, 0.5]] },
        { s: [300, 100], g: [300, 600], o: [[100, 350, 150, 20, -0.5], [500, 350, 150, 20, 0.5]] },
        { s: [150, 150], g: [450, 650], o: [[250, 300, 100, 100, 0], [350, 500, 100, 100, 0.4]] },
        { s: [300, 100], g: [100, 700], o: [[300, 200, 200, 20, 0], [300, 400, 200, 20, 0], [300, 600, 200, 20, 0]] },
        { s: [500, 150], g: [300, 700], o: [[400, 350, 150, 20, -0.6], [200, 550, 150, 20, 0.6]] },
        { s: [300, 100], g: [300, 750], o: [[300, 250, 50, 50, 0], [200, 400, 50, 50, 0], [400, 400, 50, 50, 0], [300, 550, 50, 50, 0]] }
    ];

    let state = 'INIT', currentLvl = 0, waterDrops = [], drawnLines = [], glassSensor, spawnTimer, checkTimer;
    const MAX_WATER = 100, WIN_TARGET = 75, MAX_INK = 800;
    let inkUsed = 0, isDrawing = false, lastPt = null;

    function initLevel(lvl) {
        Composite.clear(engine.world); Engine.clear(engine);
        waterDrops = []; drawnLines = []; inkUsed = 0; state = 'DRAW';
        document.getElementById('lvl-txt').innerText = `LVL ${lvl + 1}`;
        document.getElementById('status-txt').innerText = 'DRAW LINE';
        document.getElementById('status-txt').style.background = '#e74c3c';
        document.getElementById('progress-bar').style.display = 'none';
        document.getElementById('progress-fill').style.width = '0%';

        const d = levels[lvl];
        
        // Bounds
        Composite.add(engine.world, [
            Bodies.rectangle(GW/2, GH+50, GW*2, 100, { isStatic: true, render: { visible: false } }),
            Bodies.rectangle(-50, GH/2, 100, GH*2, { isStatic: true, render: { visible: false } }),
            Bodies.rectangle(GW+50, GH/2, 100, GH*2, { isStatic: true, render: { visible: false } })
        ]);

        // Glass
        const gw = 90, gh = 110, gt = 10;
        const gOpt = { isStatic: true, friction: 0.1, render: { fillStyle: 'rgba(255,255,255,0.4)', strokeStyle: '#bdc3c7', lineWidth: 2 } };
        Composite.add(engine.world, [
            Bodies.rectangle(d.g[0] - gw/2, d.g[1], gt, gh, gOpt),
            Bodies.rectangle(d.g[0] + gw/2, d.g[1], gt, gh, gOpt),
            Bodies.rectangle(d.g[0], d.g[1] + gh/2, gw + gt, gt, gOpt)
        ]);
        
        glassSensor = Bodies.rectangle(d.g[0], d.g[1], gw - 15, gh - 15, { isStatic: true, isSensor: true, render: { visible: false } });
        Composite.add(engine.world, glassSensor);

        // Spigot
        Composite.add(engine.world, Bodies.rectangle(d.s[0], d.s[1], 40, 20, { isStatic: true, render: { fillStyle: '#7f8c8d' } }));

        // Obstacles
        d.o.forEach(o => {
            Composite.add(engine.world, Bodies.rectangle(o[0], o[1], o[2], o[3], { isStatic: true, angle: o[4], render: { fillStyle: '#e67e22' } }));
        });
    }

    function spawnWater() {
        if(state !== 'SIM') return;
        let count = 0;
        document.getElementById('status-txt').innerText = 'POURING...';
        document.getElementById('status-txt').style.background = '#f39c12';
        document.getElementById('progress-bar').style.display = 'block';

        spawnTimer = setInterval(() => {
            if(count >= MAX_WATER) {
                clearInterval(spawnTimer);
                checkTimer = setTimeout(checkWin, 3000);
                return;
            }
            const drop = Bodies.circle(levels[currentLvl].s[0] + (Math.random()*10-5), levels[currentLvl].s[1] + 20, 5, {
                restitution: 0.3, friction: 0.001, density: 0.05, render: { fillStyle: '#3498db' }
            });
            waterDrops.push(drop);
            Composite.add(engine.world, drop);
            count++;
        }, 30);
    }

    function checkWin() {
        if(state !== 'SIM') return;
        let inGlass = 0;
        waterDrops.forEach(d => {
            if(Matter.Bounds.contains(glassSensor.bounds, d.position) && Matter.Detector.canCollide(d.collisionFilter, glassSensor.collisionFilter)) {
                if(Matter.Collision.collides(d, glassSensor)) inGlass++;
            }
        });

        if(inGlass >= WIN_TARGET) {
            document.getElementById('status-txt').innerText = 'SUCCESS!';
            document.getElementById('status-txt').style.background = '#2ecc71';
            setTimeout(() => {
                currentLvl++;
                if(currentLvl >= levels.length) showScreen("YOU WIN!", "All 20 levels completed.");
                else showScreen("LEVEL CLEARED!", `Ready for Level ${currentLvl + 1}?`, "NEXT");
            }, 1500);
        } else {
            document.getElementById('status-txt').innerText = 'FAILED!';
            setTimeout(() => showScreen("OUT OF WATER", "Try drawing a better path.", "RETRY"), 1000);
        }
    }

    // Input Handling
    function getXY(e) {
        const rect = render.canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * (GW / rect.width), y: (clientY - rect.top) * (GH / rect.height) };
    }

    function startDraw(e) {
        if(state !== 'DRAW') return;
        isDrawing = true; lastPt = getXY(e);
    }

    function drawLine(e) {
        if(!isDrawing || state !== 'DRAW' || inkUsed >= MAX_INK) return;
        e.preventDefault();
        const pt = getXY(e);
        const dist = Vector.magnitude(Vector.sub(pt, lastPt));
        if(dist > 8) {
            const circle = Bodies.circle(pt.x, pt.y, 6, { isStatic: true, render: { fillStyle: '#2c3e50' } });
            Composite.add(engine.world, circle);
            drawnLines.push(circle);
            inkUsed += dist; lastPt = pt;
        }
    }

    function endDraw(e) {
        if(state !== 'DRAW') return;
        isDrawing = false; lastPt = null;
        if(drawnLines.length > 0) { state = 'SIM'; spawnWater(); }
    }

    const c = render.canvas;
    c.addEventListener('mousedown', startDraw); c.addEventListener('mousemove', drawLine); window.addEventListener('mouseup', endDraw);
    c.addEventListener('touchstart', startDraw, {passive:false}); c.addEventListener('touchmove', drawLine, {passive:false}); window.addEventListener('touchend', endDraw);

    Events.on(engine, 'afterUpdate', () => {
        if(state === 'SIM') {
            let inGlass = 0;
            waterDrops.forEach(d => {
                if(d.position.y > GH + 100) Composite.remove(engine.world, d); // cleanup
                else if(Matter.Bounds.contains(glassSensor.bounds, d.position) && Matter.Collision.collides(d, glassSensor)) inGlass++;
            });
            document.getElementById('progress-fill').style.width = `${Math.min(100, (inGlass/WIN_TARGET)*100)}%`;
        }
    });

    function showScreen(title, desc, btnText = "PLAY") {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('o-title').innerText = title;
        document.getElementById('o-desc').innerText = desc;
        document.getElementById('start-btn').innerText = btnText;
    }

    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('overlay').style.display = 'none';
        if(currentLvl >= levels.length) currentLvl = 0;
        initLevel(currentLvl);
    });

    Render.run(render); Runner.run(Runner.create(), engine);
</script>
</body>
</html>
